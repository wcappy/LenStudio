<span class="material-symbols-outlined text-[18px]" style="font-variation-settings: 'FILL' 1;">screen_rotation</span>
<span class="text-xs font-medium tracking-wide">Tilt phone to preview</span>
</div>
</div>

</button>
<div class="flex-grow relative flex items-center">

</div>
<span class="text-[10px] font-bold font-headline uppercase tracking-widest text-secondary opacity-60">Speed</span>
</div>
</section>

<button class="flex-shrink-0 w-16 h-16 rounded-lg bg-surface-container-high flex items-center justify-center border-2 border-dashed border-outline-variant text-secondary active:bg-surface-container-highest transition-colors">

<span class="font-['Manrope'] text-[10px] uppercase tracking-widest font-semibold mt-1">Effect</span>

<span class="font-['Manrope'] text-[10px] uppercase tracking-widest font-semibold mt-1">Editor</span>

<button class="flex flex-col items-center justify-center text-[#a9c8fc] opacity-60 hover:opacity-100 transition-opacity active:translate-y-0.5 duration-150">
<span class="material-symbols-outlined">ios_share</span>
<span class="font-['Manrope'] text-[10px] uppercase tracking-widest font-semibold mt-1">Export</span>
